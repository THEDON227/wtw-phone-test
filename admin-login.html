<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="WTW Admin sign in.">
  <title>WTW Admin Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700;800&family=DM+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{--accent:#00C2D1;--am:rgba(0,194,209,.1);--ab:rgba(0,194,209,.22);--tx:#F0EDE8;--tm:rgba(240,237,232,.62);--bad:#ef6b6b;--shadow:0 28px 84px rgba(0,0,0,.36)}
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{min-height:100%;overflow-x:hidden}
    body{
      margin:0;
      min-height:100vh;
      background:#080b0f;
      color:var(--tx);
      font-family:'DM Sans',system-ui,sans-serif;
      -webkit-font-smoothing:antialiased;
    }
    body::before{
      content:'';
      position:fixed;
      inset:-80px;
      background-image:url('assets/wtw-logo-transparent.png');
      background-size:170px auto;
      background-repeat:repeat;
      opacity:.03;
      mix-blend-mode:screen;
      pointer-events:none;
      z-index:0;
    }
    body::after{
      content:'';
      position:fixed;
      inset:0;
      background:radial-gradient(circle at 18% 0,rgba(255,255,255,.04),transparent 34%),linear-gradient(180deg,rgba(5,7,10,.12),rgba(5,7,10,.96));
      pointer-events:none;
      z-index:0;
    }
    body>*{position:relative;z-index:1}
    a{color:inherit;text-decoration:none}
    .shell{
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:24px;
    }
    .panel{
      width:min(440px,100%);
      border:1px solid rgba(255,255,255,.08);
      background:linear-gradient(180deg,rgba(8,10,14,.96),rgba(3,5,8,.995));
      box-shadow:var(--shadow);
      padding:26px;
      display:grid;
      gap:20px;
    }
    .brand{
      display:flex;
      align-items:center;
      gap:12px;
    }
    .brand-logo{width:56px;height:38px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .brand-logo img{width:56px;height:auto;display:block;object-fit:contain;filter:drop-shadow(0 0 12px var(--accent))}
    .brand-copy{min-width:0}
    .brand-name{font-size:12px;font-weight:900;letter-spacing:2.5px;line-height:1}
    .brand-sub{margin-top:3px;font-size:7px;font-weight:800;letter-spacing:2.6px;color:var(--accent);white-space:nowrap}
    .title{
      font-family:'Cormorant Garamond',serif;
      font-size:32px;
      line-height:1;
      font-weight:700;
    }
    .subtitle{
      font-size:13px;
      line-height:1.7;
      color:var(--tm);
    }
    .form{
      display:grid;
      gap:12px;
    }
    .field{
      display:grid;
      gap:7px;
    }
    .field label{
      font-size:9px;
      font-weight:900;
      letter-spacing:2px;
      text-transform:uppercase;
      color:rgba(240,237,232,.42);
    }
    .input{
      height:42px;
      border:1px solid var(--ab);
      background:rgba(255,255,255,.04);
      color:var(--tx);
      padding:0 12px;
      font:inherit;
      font-size:13px;
      outline:none;
    }
    .input:focus{border-color:var(--accent);box-shadow:0 0 0 1px rgba(0,194,209,.18) inset}
    .btn{
      height:42px;
      border:1px solid transparent;
      background:linear-gradient(135deg,var(--accent),rgba(255,255,255,.86));
      color:#020406;
      font-size:10px;
      font-weight:900;
      letter-spacing:1.6px;
      text-transform:uppercase;
      cursor:pointer;
    }
    .btn:disabled{opacity:.6;cursor:not-allowed}
    .status{
      display:none;
      border:1px solid var(--ab);
      background:rgba(255,255,255,.035);
      padding:12px 14px;
      font-size:13px;
      line-height:1.7;
      color:var(--tx);
    }
    .status.show{display:block}
    .status.error{border-color:rgba(239,107,107,.45);background:rgba(239,107,107,.08)}
    .footer{
      display:flex;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      font-size:11px;
      color:var(--tm);
    }
    .footer a{color:var(--accent)}
  </style>
</head>
<body>
  <main class="shell">
    <section class="panel">
      <a class="brand" href="index.html" aria-label="WTW home">
        <div class="brand-logo"><img src="assets/wtw-logo-transparent.png" alt="WTW"></div>
        <div class="brand-copy">
          <div class="brand-name">WHERE'S THE WAVE</div>
          <div class="brand-sub">ADMIN SIGN IN</div>
        </div>
      </a>
      <div>
        <div class="title">WTW Command</div>
        <div class="subtitle">Approved admin and operator access only.</div>
      </div>
      <div class="status" id="authStatus"></div>
      <form class="form" id="loginForm">
        <div class="field">
          <label for="email">Email</label>
          <input class="input" id="email" name="email" type="email" autocomplete="email" required>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input class="input" id="password" name="password" type="password" autocomplete="current-password" required>
        </div>
        <button class="btn" id="submitBtn" type="submit">Sign In</button>
      </form>
      <div class="footer">
        <span>Supabase Auth required</span>
        <a href="index.html">Return to site</a>
      </div>
    </section>
  </main>

  <script src="supabase-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>
  <script>
    function setStatus(message,isError){
      const el=document.getElementById('authStatus');
      if(!el)return;
      el.classList.add('show');
      el.classList.toggle('error',!!isError);
      el.textContent=message;
    }
    function getClient(){
      return window.WTWBackend&&WTWBackend.createClient?WTWBackend.createClient():null;
    }
    async function verifyExistingSession(){
      const client=getClient();
      if(!client){
        setStatus('Supabase auth is not configured yet.',true);
        return;
      }
      try{
        const sessionResult=await WTWBackend.getSession();
        const session=sessionResult&&sessionResult.data&&sessionResult.data.session;
        if(!session)return;
        const approved=await WTWBackend.isWtwAdmin();
        if(approved){
          window.location.replace('admin.html');
          return;
        }
        try{await WTWBackend.signOutAdmin();}catch(e){}
        const params=new URLSearchParams(window.location.search);
        params.set('denied','1');
        window.location.replace('admin-login.html?'+params.toString());
      }catch(err){
        // Leave the form visible; sign-in will report a direct error.
      }
    }
    document.addEventListener('DOMContentLoaded',async function(){
      const params=new URLSearchParams(window.location.search);
      if(params.get('denied')==='1')setStatus('Access denied. Use an approved WTW admin account.',true);
      await verifyExistingSession();
      const form=document.getElementById('loginForm');
      const btn=document.getElementById('submitBtn');
      form.addEventListener('submit',async function(e){
        e.preventDefault();
        const client=getClient();
        if(!client){
          setStatus('Supabase auth is not configured yet.',true);
          return;
        }
        const email=document.getElementById('email').value.trim();
        const password=document.getElementById('password').value;
        btn.disabled=true;
        btn.textContent='Signing In...';
        setStatus('Signing in...',false);
        try{
          const {error}=await WTWBackend.signInAdmin(email,password);
          if(error)throw error;
          const approved=await WTWBackend.isWtwAdmin();
          if(!approved){
            await WTWBackend.signOutAdmin();
            setStatus('Access denied. This account is not approved for WTW admin access.',true);
            btn.disabled=false;
            btn.textContent='Sign In';
            return;
          }
          window.location.replace('admin.html');
        }catch(err){
          setStatus('Unable to sign in. Check your email and password.',true);
          btn.disabled=false;
          btn.textContent='Sign In';
        }
      });
    });
  </script>
</body>
</html>
