<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="1; url=events.html">
<title>WTW Events - Redirecting</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:#070a0d;color:#f0ede8;font-family:Inter,sans-serif;display:grid;place-items:center;padding:28px;-webkit-font-smoothing:antialiased}
body:before{content:"";position:fixed;inset:0;background:radial-gradient(circle at 50% 10%,rgba(0,194,209,.13),transparent 34%),linear-gradient(180deg,rgba(255,255,255,.035),transparent 34%);pointer-events:none}
.panel{position:relative;width:min(100%,520px);border:1px solid rgba(255,255,255,.1);background:rgba(10,13,17,.84);padding:34px;border-radius:12px;box-shadow:0 24px 80px rgba(0,0,0,.46)}
.eyebrow{font-size:10px;font-weight:900;letter-spacing:4px;text-transform:uppercase;color:#00c2d1;margin-bottom:14px}
h1{font-family:"Playfair Display",serif;font-size:clamp(34px,8vw,58px);line-height:.96;font-weight:900;letter-spacing:0;margin-bottom:18px}
p{font-size:15px;line-height:1.7;color:rgba(240,237,232,.72);margin-bottom:24px}
a{display:inline-flex;align-items:center;justify-content:center;min-height:46px;padding:0 22px;border-radius:8px;background:#00c2d1;color:#041012;text-decoration:none;font-size:12px;font-weight:900;letter-spacing:1.2px;text-transform:uppercase}
a:focus{outline:2px solid rgba(0,194,209,.5);outline-offset:3px}
</style>
<script>
window.setTimeout(function(){
  window.location.replace("events.html");
}, 300);
</script>
</head>
<body>
<main class="panel" aria-live="polite">
  <div class="eyebrow">WTW Events</div>
  <h1>Events</h1>
  <p>WTW Events now lives on the main Events page. Redirecting...</p>
  <a href="events.html">Open Events</a>
</main>
</body>
</html>
